{% extends 'base.html' %}

{% block title %}Create Account — {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h1 class="font-display text-2xl font-bold">Create Account</h1>
        <p class="text-sm text-gray-500 mt-1">{{ site_settings.account_benefits_text }}</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-gray-500 mb-1 block">First Name</label>
                <input type="text" name="first_name" required
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500">
            </div>
            <div>
                <label class="text-xs text-gray-500 mb-1 block">Last Name</label>
                <input type="text" name="last_name" required
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500">
            </div>
        </div>

        <div>
            <label class="text-xs text-gray-500 mb-1 block">Email</label>
            <input type="email" name="email" required
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500"
                   placeholder="your@email.com">
        </div>

        <div>
            <label class="text-xs text-gray-500 mb-1 block">Password</label>
            <input type="password" name="password" required minlength="8"
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500"
                   placeholder="At least 8 characters">
        </div>

        <div>
            <label class="text-xs text-gray-500 mb-1 block">Confirm Password</label>
            <input type="password" name="password2" required
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500"
                   placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full py-3.5 bg-black text-white rounded-xl text-sm font-bold uppercase tracking-wider hover:bg-gold-600 transition-colors">
            Create Account
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{% url 'accounts:login' %}" class="text-gold-600 font-medium hover:underline">Sign in</a>
    </p>
</div>
{% endblock %}
