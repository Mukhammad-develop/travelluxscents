{% extends 'base.html' %}

{% block title %}Sign In — {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h1 class="font-display text-2xl font-bold">Welcome Back</h1>
        <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="text-xs text-gray-500 mb-1 block">Email</label>
            <input type="email" name="email" required
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500"
                   placeholder="your@email.com">
        </div>

        <div>
            <label class="text-xs text-gray-500 mb-1 block">Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gold-500"
                   placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full py-3.5 bg-black text-white rounded-xl text-sm font-bold uppercase tracking-wider hover:bg-gold-600 transition-colors">
            Sign In
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="{% url 'accounts:register' %}" class="text-gold-600 font-medium hover:underline">Create one</a>
    </p>
</div>
{% endblock %}
